  <body>
    <script>
      // GitHub Pages SPA redirect handler — restores path from encoded `p` param set by 404.html
      (function() {
        try {
          var params = new URLSearchParams(window.location.search);
          var p = params.get('p');
          if (p) {
            var decoded = decodeURIComponent(p);
            if (decoded && decoded.charAt(0) === '/') {
              window.history.replaceState(null, null, decoded + window.location.hash);
            }
          }
        } catch (e) {
          // ignore malformed input
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
