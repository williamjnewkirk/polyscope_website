<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    // GitHub Pages SPA redirect — encode full path into `p` query param
    (function() {
      var l = window.location;
      var origin = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '');
      var fullPath = l.pathname + (l.search || '') + (l.hash || '');
      var encoded = encodeURIComponent(fullPath);
      l.replace(origin + '/?p=' + encoded);
    })();
  </script>
</head>
<body></body>
</html>
